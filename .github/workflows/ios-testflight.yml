name: iOS TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testflight:
    name: Build and upload to TestFlight
    # App Store Connect requires iOS 26 SDK (Xcode 26+). macos-latest is still Xcode 16.x.
    runs-on: macos-26
    environment: testflight
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Import code signing certificate
        env:
          P12_B64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing_temp.keychain"
          KEYCHAIN_PASSWORD="actions"
          P12_PATH="$RUNNER_TEMP/distribution.p12"
          echo "P12_PATH=$P12_PATH" >> "$GITHUB_ENV"

          CLEAN_B64=$(echo "$P12_B64" | tr -d '[:space:]')
          echo "$CLEAN_B64" | base64 --decode > "$P12_PATH"
          if [ ! -s "$P12_PATH" ]; then
            echo "Decoded P12 is empty. Re-create IOS_DIST_CERT_BASE64 from the .p12 file (single line, no line breaks)."
            exit 1
          fi
          echo "P12 size: $(wc -c < "$P12_PATH") bytes"

          export P12_PASSWORD
          if openssl pkcs12 -info -in "$P12_PATH" -passin env:P12_PASSWORD -noout 2>/dev/null; then
            echo "P12 password validated."
          elif openssl pkcs12 -info -in "$P12_PATH" -passin env:P12_PASSWORD -noout -legacy 2>/dev/null; then
            echo "P12 password validated (OpenSSL -legacy; normal for Keychain exports)."
          else
            echo "OpenSSL could not read the P12 with IOS_DIST_CERT_PASSWORD."
            echo "Fix the password secret, or re-export the .p12 from Keychain with the private key included."
            openssl pkcs12 -info -in "$P12_PATH" -passin env:P12_PASSWORD -noout -legacy 2>&1 | head -5 || true
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$P12_PATH" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -f pkcs12 -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          EXISTING_KEYCHAINS=$(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "$KEYCHAIN" $EXISTING_KEYCHAINS
          security default-keychain -s "$KEYCHAIN"
          echo "Codesigning identities in temp keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Install provisioning profile
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"
          CLEAN_B64=$(echo "$PROVISION_PROFILE_BASE64" | tr -d '[:space:]')
          echo "$CLEAN_B64" | base64 --decode > "$PROFILE_PATH"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "Installed provisioning profile $UUID"

      - name: Write EAS local credentials
        env:
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          P12_PATH: ${{ env.P12_PATH }}
          PROFILE_PATH: ${{ env.PROFILE_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const credentials = {
            ios: {
              provisioningProfilePath: process.env.PROFILE_PATH,
              distributionCertificate: {
                path: process.env.P12_PATH,
                password: process.env.P12_PASSWORD,
              },
            },
          };

          fs.writeFileSync(
            path.join(process.cwd(), 'credentials.json'),
            JSON.stringify(credentials, null, 2)
          );
          console.log('Wrote credentials.json for EAS local build.');
          NODE

      - name: Build iOS app (EAS local)
        env:
          IOS_BUILD_NUMBER: ${{ github.run_number }}
          EAS_BUILD_NO_EXPO_GO_WARNING: 'true'
        shell: bash
        run: |
          set -euo pipefail
          IPA_PATH="$RUNNER_TEMP/backseat-games.ipa"
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "iOS build number (CFBundleVersion): $IOS_BUILD_NUMBER"
          eas build \
            --local \
            --non-interactive \
            --platform ios \
            --profile production \
            --output "$IPA_PATH"
          if [ ! -f "$IPA_PATH" ]; then
            echo "IPA not found at $IPA_PATH"
            exit 1
          fi
          echo "Built IPA: $IPA_PATH ($(wc -c < "$IPA_PATH") bytes)"

      - name: Upload to TestFlight
        env:
          KEY_B64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          KEY_PEM: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          IPA_PATH: ${{ env.IPA_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          KEYS_DIR="$RUNNER_TEMP/private_keys"
          KEY_FILE="$KEYS_DIR/AuthKey_${API_KEY_ID}.p8"
          TRY_FILE="$RUNNER_TEMP/AuthKey.try.p8"
          mkdir -p "$KEYS_DIR"

          key_is_valid() {
            grep -q "BEGIN PRIVATE KEY" "$1" && openssl pkey -in "$1" -noout 2>/dev/null
          }

          write_b64_secret() {
            local label="$1"
            local b64="$2"
            [ -n "$b64" ] || return 1
            local clean
            clean=$(printf '%s' "$b64" | tr -d '[:space:]')
            printf '%s' "$clean" | base64 --decode > "$TRY_FILE" 2>/dev/null || return 1
            if key_is_valid "$TRY_FILE"; then
              cp "$TRY_FILE" "$KEY_FILE"
              echo "Using $label ($(wc -c < "$KEY_FILE") bytes)."
              return 0
            fi
            return 1
          }

          write_pem_secret() {
            local label="$1"
            local pem="$2"
            [ -n "$pem" ] || return 1
            local normalized
            normalized=$(printf '%s' "$pem" | tr -d '\r')
            if [[ "$normalized" != *$'\n'* ]] && [[ "$normalized" == *'\\n'* ]]; then
              normalized=$(printf '%s' "$normalized" | sed 's/\\n/\n/g')
            fi
            if [[ "$normalized" != *"BEGIN PRIVATE KEY"* ]]; then
              write_b64_secret "$label (PEM field looked like base64)" "$normalized" && return 0
              return 1
            fi
            printf '%s\n' "$normalized" > "$TRY_FILE"
            if key_is_valid "$TRY_FILE"; then
              cp "$TRY_FILE" "$KEY_FILE"
              echo "Using $label ($(wc -c < "$KEY_FILE") bytes)."
              return 0
            fi
            return 1
          }

          if [ -z "$KEY_B64" ] && [ -z "$KEY_PEM" ]; then
            echo "Set APPLE_API_KEY_BASE64 (recommended) or APPLE_API_PRIVATE_KEY."
            exit 1
          fi

          echo "API key secret lengths: BASE64=${#KEY_B64} chars, PEM=${#KEY_PEM} chars."

          if write_b64_secret "APPLE_API_KEY_BASE64" "$KEY_B64"; then
            :
          elif write_pem_secret "APPLE_API_PRIVATE_KEY" "$KEY_PEM"; then
            :
          else
            echo "Could not load a valid App Store Connect .p8 key."
            echo "Recommended: keep only APPLE_API_KEY_BASE64 (delete APPLE_API_PRIVATE_KEY if set)."
            echo "PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes('AuthKey_${API_KEY_ID}.p8'))"
            exit 1
          fi

          chmod 600 "$KEY_FILE"
          export API_PRIVATE_KEYS_DIR="$KEYS_DIR"
          xcrun altool --output-format xml \
            --upload-app \
            --file "$IPA_PATH" \
            --type ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backseat-games-ios-ipa
          path: ${{ env.IPA_PATH }}
          retention-days: 14
          if-no-files-found: ignore
